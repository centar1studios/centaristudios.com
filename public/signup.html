<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account - Ajay Hunter</title>
<link rel="stylesheet" href="site.css">
<script>(async()=>{try{const r=await fetch("/api/theme");if(!r.ok)return;const t=await r.json();const s=document.documentElement.style;Object.entries(t).forEach(([k,v])=>s.setProperty("--"+k,v));}catch(e){}})();</script>
<style>
body { min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg); padding:2rem 1rem; }
.auth-wrap { width:100%; max-width:440px; position:relative; z-index:1; }
.auth-logo { text-align:center; margin-bottom:2rem; }
.auth-logo .name { font-family:'Cormorant Garamond',serif; font-size:1.8rem; font-weight:300; color:var(--text); }
.auth-logo .sub  { font-size:0.65rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--subtext); margin-top:4px; }
.auth-card { background:var(--bg2); border:1px solid var(--border); padding:2.5rem; border-radius:4px; }
.auth-card h2 { font-family:'Cormorant Garamond',serif; font-size:1.6rem; font-weight:300; color:var(--text); margin-bottom:0.4rem; }
.auth-card p { font-size:0.84rem; color:var(--subtext); margin-bottom:1.75rem; }
.err-box { background:rgba(245,100,100,0.1); border:1px solid rgba(245,100,100,0.3); border-left:3px solid #f56464; padding:1rem 1.25rem; font-size:0.85rem; color:#ffaaaa; margin-bottom:1.25rem; display:none; border-radius:2px; }
.pw-hint { font-size:0.7rem; color:var(--dim); margin-top:0.3rem; }
.auth-note { text-align:center; margin-top:1.25rem; font-size:0.8rem; color:var(--subtext); }
.auth-note a { color:var(--lavender); }
.btn-lavender { background:linear-gradient(135deg,var(--lavender),var(--periwinkle)); color:var(--bg); font-family:'Jost',sans-serif; font-size:0.78rem; font-weight:500; letter-spacing:0.14em; text-transform:uppercase; padding:0.85rem 2rem; border:none; cursor:pointer; width:100%; border-radius:2px; transition:all 0.25s; }
.btn-lavender:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(196,176,245,0.3); }
.btn-lavender:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
</style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<canvas id="stars"></canvas>

<div class="auth-wrap">
  <div class="auth-logo">
    <a href="index.html">
      <div class="name">Ajay Hunter</div>
      <div class="sub">Digital Artist</div>
    </a>
  </div>

  <div class="auth-card">
    <h2>Create an account</h2>
    <p>Sign up to track your commissions, message Ajay, and download your files - all in one place.</p>

    <div class="err-box" id="err-box"></div>

    <div style="display:flex;flex-direction:column;gap:1rem;">
      <div>
        <label class="field-label">Your Name</label>
        <input type="text" id="s-name" class="input-field" placeholder="Your name">
      </div>
      <div>
        <label class="field-label">Email Address</label>
        <input type="email" id="s-email" class="input-field" placeholder="you@example.com">
        <p class="pw-hint">Use the same email you submitted your inquiry with to link your projects automatically.</p>
      </div>
      <div>
        <label class="field-label">Password</label>
        <div style="position:relative;">
          <input type="password" id="s-pass" class="input-field" placeholder="At least 8 characters" style="padding-right:3.5rem;">
          <button type="button" onclick="togglePw()" style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;font-size:0.7rem;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--subtext);cursor:pointer;padding:0;" id="pw-toggle">Show</button>
        </div>
        <p class="pw-hint">Minimum 8 characters.</p>
      </div>
      <div>
        <label class="field-label">Confirm Password</label>
        <input type="password" id="s-pass2" class="input-field" placeholder="Repeat your password">
      </div>
      <button class="btn-lavender" id="signup-btn" onclick="doSignup()" style="margin-top:0.5rem;">Create Account</button>
    </div>

    <div class="auth-note">
      Already have an account? <a href="login.html">Sign in</a><br>
      <a href="index.html" style="color:var(--dim);">Back to site</a>
    </div>
  </div>
</div>

<script>
const canvas=document.getElementById('stars');const ctx=canvas.getContext('2d');let stars=[];function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}function initStars(){stars=[];const n=Math.floor((canvas.width*canvas.height)/7000);for(let i=0;i<n;i++)stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1+0.2,a:Math.random()*0.6+0.1,sp:Math.random()*0.004+0.001,ph:Math.random()*Math.PI*2});}function drawStars(t){ctx.clearRect(0,0,canvas.width,canvas.height);stars.forEach(s=>{const a=s.a*(0.5+0.5*Math.sin(t*s.sp+s.ph));ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(196,176,245,${a})`;ctx.fill();});requestAnimationFrame(drawStars);}
resize();initStars();requestAnimationFrame(drawStars);window.addEventListener('resize',()=>{resize();initStars();});

function togglePw() {
  const inp = document.getElementById('s-pass');
  const btn = document.getElementById('pw-toggle');
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = 'Hide'; }
  else { inp.type = 'password'; btn.textContent = 'Show'; }
}

function showError(msg) {
  const errBox = document.getElementById('err-box');
  errBox.innerHTML = '<strong>Error:</strong> ' + msg;
  errBox.style.display = 'block';
  errBox.scrollIntoView({behavior:'smooth'});
}

async function doSignup() {
  const errBox = document.getElementById('err-box');
  const btn    = document.getElementById('signup-btn');
  errBox.style.display = 'none';

  const name  = document.getElementById('s-name').value.trim();
  const email = document.getElementById('s-email').value.trim();
  const pass  = document.getElementById('s-pass').value;
  const pass2 = document.getElementById('s-pass2').value;

  if (!name)  { showError('Please enter your name.'); return; }
  if (!email) { showError('Please enter your email.'); return; }
  if (!pass)  { showError('Please enter a password.'); return; }
  if (pass.length < 8) { showError('Password must be at least 8 characters.'); return; }
  if (pass !== pass2) { showError('Passwords do not match.'); return; }

  btn.textContent = 'Creating account...';
  btn.disabled = true;

  try {
    const r = await fetch('/api/auth/client-signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password: pass }),
    });

    let d = {};
    try { d = await r.json(); } catch(parseErr) { d = {}; }

    if (!r.ok || d.error) {
      showError(d.error || d.details || 'Signup failed. Please try again. (Status: ' + r.status + ')');
    } else {
      localStorage.setItem('client_token', d.token);
      localStorage.setItem('client_name', d.name);
      location.href = 'portal.html';
    }
  } catch(err) {
    showError('Network error: ' + (err.message || 'Could not reach the server. Please try again.'));
  }

  btn.textContent = 'Create Account';
  btn.disabled = false;
}
</script>
</body>
</html>
